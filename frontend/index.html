<!DOCTYPE html>
<!-- THIS IS THE LOGIN PAGE!!!!!!! - emil -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weldo System | Welcome!</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navBar {
            height: 3.5rem;
            border: 0.0625rem solid black;
        }
        .mainBody {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            border: 0.0625rem solid black;
        }
        .footer { 
            height:3rem; 
            border: 0.0625rem solid black; 
        }
        .mainFrame {
            padding: 0.5rem 2rem 2rem 2rem;
            width: 100%;
            max-width: 24rem;
            border: 0.0625rem solid black;
        }
        .mainFrame h1{
            padding: 1.4rem;
            text-align: center;
            font-size: 2rem;
        }
        .loginForm{
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .formGroup{
            display: flex;
            flex-direction: column;
            gap: 0.30rem;
        }

        .formGroup input{
            width: 100%;
            padding: 1rem;
            outline: none;
            border-radius: 1rem;
            border: 0.05rem solid rgb(145, 145, 145);
        }

        .loginForm button {
            width: 100%;
            padding: 0.67rem;
            font-size: 1rem;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            background-color: #4f46e5;
            color: white;
        }

        .loginForm button:hover{
            background-color: #6962f1;

        }




    </style>
</head>
<body>
    <div class ="navBar"></div>
    <div class = "mainBody">
        <!-- Main LogIn Frame -->
        <div class = "mainFrame">
            <div class = "Title">
                <h1>Welcome to ERMS!</h1>
            </div>
            <!-- login form n -->
            <div class ="loginForm">
                <div class="formGroup">
                    <label>StudentID:</label>
                    <input type="text" placeholder="e.g 2025...">
                </div>
                <div class="formGroup">
                    <label>Password:</label>
                    <input type="password" placeholder="e.g @miss kona si Cashew123">
                </div>
                <button>Login</button>
            </div>
        </div>


    </div>
    <div class = "footer"></div>
</body>
</html>
