<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERMS | Student Dashboard</title>
    <style>
        :root {
            --bg: #f5f4f0;
            --surface: #ffffff;
            --border: #e2e0d8;
            --text: #1a1a18;
            --muted: #8a8880;
            --accent: #2d5a3d;
            --accent-light: #e8f0eb;
            --danger: #c0392b;
            --danger-light: #fdf0ee;
            --shadow: 0 0.125rem 0.75rem rgba(0,0,0,0.07);
            --radius: 0.75rem;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            color: var(--text);
            font-family: sans-serif;
        }

        .navbar {
            height: 3.75rem;
            background: var(--surface);
            border-bottom: 0.0625rem solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            position: sticky;
            top: 0;
        }

        .navbar-brand { font-size: 1.25rem; color: var(--accent); font-weight: 600; }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .navbar-user { font-size: 0.875rem; color: var(--muted); }
        .navbar-user span { color: var(--text); font-weight: 500; }

        .btn-logout {
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--danger);
            background: var(--danger-light);
            border: none;
            padding: 0.4rem 0.875rem;
            border-radius: 2rem;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-logout:hover { background: #f5d5d2; }

        .main {
            flex: 1;
            padding: 2rem;
            max-width: 75rem;
            width: 100%;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 { font-size: 1.75rem; font-weight: 400; }
        .page-header p { font-size: 0.875rem; color: var(--muted); margin-top: 0.2rem; }

        .event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(14rem, 1fr));
            gap: 1.25rem;
        }

        .event-card {
            background: var(--surface);
            border: 0.0625rem solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .event-card:hover {
            transform: translateY(-0.2rem);
            box-shadow: var(--shadow);
        }

        .event-cover {
            height: 8rem;
            background: var(--accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        .event-info {
            padding: 0.875rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .event-name {
            font-size: 0.9375rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .event-date { font-size: 0.75rem; color: var(--muted); }

        .event-slots {
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 500;
        }

        .event-actions {
            padding: 0.625rem 1rem;
            border-top: 0.0625rem solid var(--border);
        }

        .btnView {
            display: block;
            text-align: center;
            padding: 0.4rem;
            font-size: 0.8rem;
            border-radius: 0.375rem;
            background: var(--accent-light);
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .btnView:hover { opacity: 0.8; }

        .footer {
            height: 3rem;
            border-top: 0.0625rem solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: var(--muted);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">ERMS</div>
        <div class="navbar-right">
            <p class="navbar-user">Welcome, <span th:text="${session.student}">Student</span></p>
            <a href="/logout" class="btn-logout">Logout</a>
        </div>
    </nav>

    <div class="main">
        <div class="page-header">
            <h1>Events</h1>
            <p>Browse and register for available events</p>
        </div>

        <div class="event-grid">
            <div class="event-card" th:each="event : ${events}">
                <div class="event-cover">📅</div>
                <div class="event-info">
                    <div class="event-name" th:text="${event.eventName}">Event Name</div>
                    <div class="event-date" th:text="${event.eventDate}">Jan 1, 2025</div>
                    <div class="event-slots" th:text="${event.maxSlots - event.currentSlots} + ' slots left'">0 slots left</div>
                </div>
                <div class="event-actions">
                    <a class="btnView" th:href="@{/student/events/{id}(id=${event.eventId})}">View & Register</a>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        Weldo Fanclub &mdash; Event Registration &amp; Management System
    </div>

</body>
</html>
